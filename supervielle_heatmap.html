<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Supervielle MOBI — Heatmap Home</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.47.0/tabler-icons.min.css">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f0f0f5;color:#111}
.page{max-width:1120px;margin:0 auto;padding:20px 16px}
.topbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px;flex-wrap:wrap;gap:12px}
.logo{display:flex;align-items:center;gap:10px}
.tri{width:0;height:0;border-top:10px solid transparent;border-bottom:10px solid transparent;border-left:18px solid #EA4E65}
.ttl{font-size:18px;font-weight:700;color:#111}
.sub{font-size:12px;color:#888;margin-top:2px}
.msel{font-size:12px;padding:7px 12px;border-radius:10px;border:1.5px solid #ddd;background:white;color:#333;font-family:inherit;cursor:pointer;font-weight:500}
.msel:focus{outline:none;border-color:#EA4E65}
.main{display:flex;gap:24px;align-items:flex-start}
.phone-col{flex:0 0 auto}
.right-col{flex:1;min-width:0}

/* PHONE */
.phone-frame{position:relative;width:288px;border-radius:38px;border:7px solid #1c1c1e;overflow:hidden;box-shadow:0 20px 60px rgba(0,0,0,.22)}
.phone-img{width:100%;display:block;user-select:none;-webkit-user-drag:none;pointer-events:none}
.phone-hint{font-size:9px;color:#bbb;text-align:center;margin-top:7px;letter-spacing:.03em}

/* ZONES */
.zone{position:absolute;cursor:pointer;z-index:10;border-radius:6px}
.ho{position:absolute;inset:0;border-radius:inherit;opacity:0;transition:opacity .18s;pointer-events:none}
.zone:hover>.ho{opacity:1}
.zone.dimmed{opacity:.15;pointer-events:none}
.zone.dimmed .badge{display:none}
.zone.selected>.ho{opacity:1!important}

/* BADGE */
.badge{position:absolute;top:-9px;left:50%;transform:translateX(-50%);background:#C1121F;color:white;font-size:7.5px;font-weight:700;padding:2px 5px;border-radius:8px;white-space:nowrap;z-index:25;pointer-events:none;line-height:1.4;min-width:22px;text-align:center;box-shadow:0 1px 4px rgba(0,0,0,.2)}

/* GROUP FILTERS */
.gf-wrap{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px}
.gf{padding:5px 12px;border-radius:20px;border:1.5px solid #e0e0e0;background:white;font-size:11px;cursor:pointer;color:#555;transition:all .15s;font-family:inherit;font-weight:500}
.gf:hover{border-color:#EA4E65;color:#EA4E65}
.gf.on{background:#EA4E65;color:white;border-color:#EA4E65}

/* SUMMARY */
.sum-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:7px;margin-bottom:14px}
.scard{background:white;border-radius:11px;padding:10px 12px;border:1px solid #ebebeb}
.scard-lbl{font-size:9.5px;color:#888;margin-bottom:3px;font-weight:500}
.scard-val{font-size:15px;font-weight:700;color:#111;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.scard-sub{font-size:9.5px;margin-top:2px}

.leg{display:flex;gap:10px;align-items:center;margin-bottom:12px;flex-wrap:wrap}
.ldot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.leg-lbl{font-size:10px;color:#888}

/* RANKING */
.sec-ttl{font-size:10px;font-weight:700;color:#bbb;text-transform:uppercase;letter-spacing:.08em;margin-bottom:8px}
.rk-list{display:flex;flex-direction:column;gap:5px;max-height:560px;overflow-y:auto;padding-right:2px}
.rk-list::-webkit-scrollbar{width:4px}
.rk-list::-webkit-scrollbar-thumb{background:#e0e0e0;border-radius:2px}
.rk{display:flex;align-items:center;gap:8px;padding:9px 11px;background:white;border:1.5px solid #ebebeb;border-radius:10px;transition:all .15s;cursor:pointer}
.rk:hover,.rk.active{border-color:#EA4E65;box-shadow:0 2px 8px rgba(234,78,101,.08)}
.rk.active{background:#fff5f6}
.rk-n{font-size:11px;font-weight:700;color:#ddd;min-width:16px;text-align:right}
.rk-info{flex:1;min-width:0}
.rk-name{font-size:11.5px;font-weight:600;color:#111;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.rk-sub{font-size:9.5px;color:#bbb;margin-top:1px}
.rk-right{text-align:right;flex-shrink:0}
.rk-val{font-size:11.5px;font-weight:700;color:#111}
.rk-bw{width:68px;height:4px;background:#f0f0f0;border-radius:2px;margin-top:4px;margin-left:auto}
.rk-bf{height:4px;border-radius:2px}
.no-z{display:inline-block;font-size:8.5px;color:#bbb;background:#f5f5f5;border-radius:4px;padding:1px 5px;margin-left:4px;vertical-align:middle}
</style>
</head>

const HS={"header_nombre": ["5%", "8%", "50%", "7%"], "chat_header": ["62%", "8%", "30%", "7%"], "cuenta": ["2%", "18%", "55%", "11%"], "aliascbu": ["55%", "18%", "42%", "4%"], "transferir": ["9.5%", "31%", "22.5%", "2.5%"], "ingresar": ["34%", "31%", "22.5%", "2.5%"], "extraer": ["58.5%", "31%", "22.5%", "2.5%"], "qa_hacer_una_recarga": ["6.5%", "40%", "22%", "16.5%"], "qa_inversion_rapida": ["29.5%", "40%", "22%", "16.5%"], "qa_plazo_fijo": ["52.5%", "40%", "22%", "16.5%"], "qa_compra_y_venta_dolar": ["75.5%", "40%", "22%", "16.5%"], "qa_chat": ["6.5%", "54%", "22%", "10.5%"], "qa_acciones_y_bonos": ["29.5%", "54%", "22%", "10.5%"], "qa_tienda": ["51.5%", "54%", "22%", "10.5%"], "qa_mostrar_mas": ["74.5%", "54%", "22%", "10.5%"], "recomendados": ["2%", "73.5%", "96%", "7.8%"], "nav_inicio": ["0%", "89%", "20%", "6.8%"], "nav_tarjetas": ["20%", "89%", "20%", "6.8%"], "nav_qr": ["40%", "85%", "20%", "6.8%"], "nav_prestamos": ["60%", "89%", "20%", "6.8%"], "nav_menu": ["80%", "89%", "20%", "6.8%"]};
const GL={"all": "Todos", "header": "Header", "cuenta": "Cuenta/CTAs", "smartmsg": "SmartMessage", "qa": "Quick Access", "gamification": "Gamificación", "banners": "Banners", "nav": "Bottom Nav"};

let period='Abr 2026', activeGroup='all';

// Build zones
const pf=document.getElementById('pf');
Object.entries(HS).forEach(([k,[l,t,w2,h2]])=>{
  const d=document.createElement('div');
  d.className='zone'; d.id='zone-'+k; d.dataset.k=k;
  d.style.cssText=`left:${l};top:${t};width:${w2};height:${h2};`;
  d.innerHTML=`<div class="ho" id="ho-${k}"></div><div class="badge" id="b-${k}"></div>`;
  d.addEventListener('mouseenter',()=>onZH(k));
  d.addEventListener('mouseleave',()=>onZL());
  pf.appendChild(d);
});

// Build filters
const gfd=document.getElementById('gf');
Object.entries(GL).forEach(([gk,gl])=>{
  const b=document.createElement('button');
  b.className='gf'+(gk==='all'?' on':'');
  b.textContent=gl; b.dataset.g=gk;
  b.onclick=()=>setG(gk);
  gfd.appendChild(b);
});

const fmt=n=>(!n||n===0)?'—':n.toLocaleString('es-AR');
const fmtK=n=>{if(!n||n===0)return'';if(n>=1e6)return(n/1e6).toFixed(1)+'M';if(n>=1e3)return Math.round(n/1e3)+'K';return''+n};
const heatC=r=>r>0.65?`rgba(234,78,101,${(0.22+r*0.28).toFixed(2)})`:r>0.3?`rgba(245,166,35,${(0.16+r*0.30).toFixed(2)})`:` rgba(76,175,80,${(0.13+r*0.22).toFixed(2)})`;
const barC=r=>r>0.65?'#EA4E65':r>0.3?'#f5a623':'#4CAF50';
const gv=k=>DATA[k]?.vals?.[period]||0;
const fk=()=>activeGroup==='all'?Object.keys(DATA):Object.keys(DATA).filter(k=>DATA[k].group===activeGroup);
const mx=ks=>Math.max(1,...ks.map(k=>gv(k)));
const vp=k=>{const mi=MESES.indexOf(period);if(mi<=0)return null;const c=gv(k),p=DATA[k]?.vals?.[MESES[mi-1]]||0;return p?(c-p)/p*100:null};

function render(){
  const aks=fk(), mv=mx(aks);
  Object.keys(HS).forEach(k=>{
    const ho=document.getElementById('ho-'+k),b=document.getElementById('b-'+k),z=document.getElementById('zone-'+k);
    if(!z)return;
    const ing=activeGroup==='all'||DATA[k]?.group===activeGroup;
    z.classList.toggle('dimmed',!ing);
    if(ing){const v=gv(k),r=v/mv;if(ho)ho.style.background=v>0?heatC(r):'transparent';if(b)b.textContent=v>0?fmtK(v):'';}
  });
  const sa=aks.filter(k=>gv(k)>0).sort((a,b)=>gv(b)-gv(a));
  if(sa.length){
    const tk=sa[0],tv=gv(tk);
    document.getElementById('sv-top').textContent=DATA[tk].name;
    document.getElementById('sv-topval').textContent=fmt(tv)+' usuarios únicos';
    const pct=vp(tk);
    if(pct!==null){
      const col=pct>=0?'#2e9e5b':'#EA4E65',arr=pct>=0?'▲':'▼';
      document.getElementById('sv-var').innerHTML=`<span style="color:${col}">${arr} ${Math.abs(pct).toFixed(1)}%</span>`;
      document.getElementById('sv-vsub').textContent='vs '+MESES[MESES.indexOf(period)-1];
    }
  }
  document.getElementById('sv-cnt').textContent=sa.length;
  document.getElementById('sv-csub').textContent=GL[activeGroup];
  document.getElementById('rk-ttl').textContent=(activeGroup==='all'?'Todos':GL[activeGroup])+' — '+period;
  const maxR=gv(sa[0])||1, mi=MESES.indexOf(period);
  document.getElementById('rk').innerHTML=sa.map((k,i)=>{
    const z=DATA[k],v=gv(k),r=v/maxR,bc=barC(r);
    const pct=vp(k);
    let vh='';
    if(pct!==null){const col=pct>=0?'#2e9e5b':'#EA4E65',arr=pct>=0?'▲':'▼';vh=` · <span style="color:${col};font-weight:700">${arr} ${Math.abs(pct).toFixed(1)}%</span>`;}
    const nz=!HS[k]?'<span class="no-z">sin zona</span>':'';
    return`<div class="rk" id="rk-${k}" data-k="${k}" onmouseenter="onLH('${k}')" onmouseleave="onLL()">
      <span class="rk-n">${i+1}</span>
      <div class="rk-info"><div class="rk-name">${z.name} ${nz}</div><div class="rk-sub">${z.comp}${vh}</div></div>
      <div class="rk-right"><div class="rk-val">${fmt(v)}</div><div class="rk-bw"><div class="rk-bf" style="width:${Math.round(r*100)}%;background:${bc}"></div></div></div>
    </div>`;
  }).join('');
}

function onZH(k){
  document.querySelectorAll('.rk').forEach(el=>el.classList.toggle('active',el.dataset.k===k));
  const row=document.getElementById('rk-'+k);
  if(row)row.scrollIntoView({behavior:'smooth',block:'nearest'});
}
function onZL(){document.querySelectorAll('.rk').forEach(el=>el.classList.remove('active'));}
function onLH(k){
  const z=document.getElementById('zone-'+k);
  if(z){z.classList.add('selected');const ho=document.getElementById('ho-'+k);if(ho)ho.style.opacity='1';}
}
function onLL(){
  document.querySelectorAll('.zone.selected').forEach(el=>{
    el.classList.remove('selected');
    const ho=el.querySelector('.ho');if(ho)ho.style.opacity='';
  });
}
function setG(g){activeGroup=g;document.querySelectorAll('.gf').forEach(b=>b.classList.toggle('on',b.dataset.g===g));render();}
function setP(p){period=p;render();}
render();
</script>
